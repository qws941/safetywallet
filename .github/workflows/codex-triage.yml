# Codex Auto-Label: add 'codex' label and trigger @codex on every new issue
# Does both label + comment in one workflow because GITHUB_TOKEN label events
# cannot trigger other workflows (GitHub's recursive workflow prevention)

name: Codex Auto-Label

on:
  issues:
    types: [opened]

permissions:
  issues: write

concurrency:
  group: codex-label-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  auto-label-and-trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Add codex label and trigger Codex
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const issue = context.payload.issue;

            // Add label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['codex'],
            });

            // Assign Codex (bot type — may fail, non-blocking)
            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: ['Codex'],
              });
            } catch (e) {
              core.info(`Codex assignee skipped: ${e.message}`);
            }

            // Trigger @codex directly (label events from GITHUB_TOKEN
            // cannot trigger other workflows)
            const body = [`@codex ${issue.title}`, '', issue.body || ''].join('
').trim();

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: body,
            });

  failure-context:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: >-
      contains(github.event.issue.title, 'failed') ||
      contains(github.event.issue.title, 'failure') ||
      contains(github.event.issue.title, 'Failed') ||
      contains(github.event.issue.title, 'Failure') ||
      contains(github.event.issue.title, '[Deploy') ||
      contains(github.event.issue.title, '[Build') ||
      contains(github.event.issue.title, '[Docker') ||
      contains(github.event.issue.title, 'Apply failed')
    steps:
      - name: Add failure investigation context
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: ['🔍 **Failure detected** — additional investigation context:', '', '1. Check the workflow run logs linked in this issue', '2. Identify the root cause of the failure', '3. If code-related, create a fix PR', '4. If credential/infrastructure/transient, summarize findings and recommended next steps'].join('\n'),
            });
