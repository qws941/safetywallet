name: Android Release Build

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: "Version code (integer, e.g., 2)"
        required: false
        type: string
      version_name:
        description: "Version name (e.g., 1.0.1)"
        required: false
        type: string
  push:
    branches: [master]
    paths:
      - "apps/worker/android/**"
      - ".github/workflows/android-release.yml"

permissions:
  contents: read

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android APK & AAB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker/android
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-36" "build-tools;34.0.0"
        working-directory: .

      - name: Cache Gradle
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/worker/android/**/*.gradle', 'apps/worker/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Decode keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > /tmp/safetywallet.keystore
        working-directory: .
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Override version (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.version_code != ''
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ inputs.version_code }}/" app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${{ inputs.version_name }}\"/" app/build.gradle

      - name: Build release APK & AAB
        env:
          KEYSTORE_FILE: /tmp/safetywallet.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease

      - name: Upload APK
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: android-apk
          path: apps/worker/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: android-aab
          path: apps/worker/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

      - name: Cleanup keystore
        if: always()
        run: rm -f /tmp/safetywallet.keystore
        working-directory: .
